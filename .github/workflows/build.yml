name: Build QMK Firmware

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout keyboard repo
        uses: actions/checkout@v4
        with:
          path: keyboard

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi python3-pip git

      - name: Install QMK CLI
        run: pip3 install qmk

      - name: QMK setup
        run: qmk setup --yes

      - name: Copy keyboard into QMK
        run: |
          mkdir -p $HOME/qmk_firmware/keyboards/scylla_waveshare_rp2040_zero
          cp -r keyboard/. $HOME/qmk_firmware/keyboards/scylla_waveshare_rp2040_zero/

      - name: Build firmware
        run: |
          cd $HOME/qmk_firmware
          make scylla_waveshare_rp2040_zero:default
          cp scylla_waveshare_rp2040_zero_default.uf2 $GITHUB_WORKSPACE/scylla.uf2

      - name: Copy handedness EEPROM files
        run: |
          cp $HOME/qmk_firmware/quantum/split_common/eeprom-lefthand.eep $GITHUB_WORKSPACE/eeprom-lefthand.eep
          cp $HOME/qmk_firmware/quantum/split_common/eeprom-righthand.eep $GITHUB_WORKSPACE/eeprom-righthand.eep

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scylla-firmware
          path: |
            scylla.uf2
            eeprom-lefthand.eep
            eeprom-righthand.eep
          retention-days: 90